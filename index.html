<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0d10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bora OS">
<title>Bora OS</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230b0d10'/%3E%3Ctext x='50' y='68' font-size='52' font-family='Arial' font-weight='bold' fill='%233da5ff' text-anchor='middle'%3EB%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="style.css?v=17">
</head>
<body>

<!-- Giriş ekranı -->
<div id="login-view" class="hidden">
  <div class="login-box">
    <div class="login-logo">Bora <span>OS</span></div>
    <p class="login-sub">Kişisel planlama ve yönetim merkezi</p>
    <input id="login-email" type="email" placeholder="E-posta" autocomplete="username">
    <input id="login-pass" type="password" placeholder="Şifre" autocomplete="current-password">
    <button id="login-btn" class="btn-primary">Giriş yap</button>
    <p id="login-error" class="login-error hidden"></p>
  </div>
</div>

<!-- Ana uygulama -->
<div id="app-view" class="hidden">
  <header>
    <div class="brand">Bora <span>OS</span></div>
    <button id="settings-btn" class="icon-btn" title="Ayarlar">⚙︎</button>
  </header>

  <main>
    <!-- GÖREVLER -->
    <section id="tab-gorevler" class="tab">
      <h1>Görevler</h1>
      <div class="add-row">
        <input id="new-task-title" type="text" placeholder="Yeni görev...">
        <select id="new-task-prio">
          <option value="">Öncelik</option>
          <option value="acil">🔴 Acil</option>
          <option value="orta">🟡 Orta</option>
          <option value="sonra">⚫ Sonra</option>
        </select>
        <select id="new-task-area"></select>
        <button id="add-task-btn" class="btn-primary">Ekle</button>
      </div>
      <div class="card ac-blue">
        <h2>📋 Açık görevler <button id="sort-toggle" class="sort-btn">Önceliğe göre</button></h2>
        <div id="open-tasks"></div>
      </div>
      <div class="card ac-blue">
        <h2>✅ Tamamlananlar <span class="muted" id="done-count"></span></h2>
        <div id="done-tasks"></div>
      </div>
      <div class="card ac-blue">
        <h2>🏷 Kategoriler</h2>
        <div class="add-row" style="margin-bottom:12px">
          <input id="new-cat-name" type="text" placeholder="Yeni kategori adı...">
          <button id="add-cat-btn" class="btn-primary">Ekle</button>
        </div>
        <div id="categories-list"></div>
      </div>
    </section>

  </main>

  <!-- Ayarlar -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-box">
      <h2>Ayarlar</h2>
      <label>Yeni şifre</label>
      <input id="new-pass" type="password" placeholder="En az 8 karakter" autocomplete="new-password">
      <button id="change-pass-btn" class="btn-primary">Şifreyi değiştir</button>
      <p id="settings-msg" class="muted"></p>
      <hr>
      <button id="logout-btn" class="btn-danger">Çıkış yap</button>
      <button id="close-settings-btn" class="btn-ghost">Kapat</button>
    </div>
  </div>
</div>

<script type="module" src="app.js?v=16"></script>
</body>
</html>
